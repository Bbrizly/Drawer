name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

# Needs these repo secrets (Settings > Secrets and variables > Actions):
#   MACOS_CERT_P12       base64 of the exported "Developer ID Application" .p12
#   MACOS_CERT_PASSWORD  the password you set when exporting that .p12
#   APPLE_ID             your Apple ID email
#   APPLE_TEAM_ID        8S2SR5UZ54
#   APPLE_APP_PASSWORD   an app-specific password from appleid.apple.com
jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and test
        run: |
          swift test
          make app

      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

      - name: Sign, notarize, and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          codesign --force --options runtime --timestamp -s "Developer ID Application" Drawer.app/Contents/MacOS/drawer-mcp
          codesign --force --options runtime --timestamp -s "Developer ID Application" Drawer.app
          ditto -c -k --keepParent Drawer.app notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple Drawer.app

      - name: Zip app
        run: ditto -c -k --sequesterRsrc --keepParent Drawer.app Drawer-macOS.zip

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Drawer ${{ steps.tag.outputs.name }}
          files: Drawer-macOS.zip
          generate_release_notes: true
          body: |
            ## Install

            1. Download **Drawer-macOS.zip** below.
            2. Double-click the zip to unpack **Drawer.app**.
            3. Drag **Drawer.app** into **Applications** and open it.

            Requires macOS 26 or later.
